<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css" />
    <style>
      body { margin: 0; }
      .token-input-container {
        padding: 16px;
        background-color: #f8f8f8;
        border-bottom: 1px solid #ddd;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .token-input-container input {
        flex: 1;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .token-input-container button {
        padding: 8px 12px;
        background-color: #4990e2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .token-input-container button:hover {
        background-color: #3d7ec9;
      }
      .swagger-ui .topbar { display: none; }
    </style>
  </head>
  <body>
    <div class="token-input-container">
      <strong>Bearer Token:</strong>
      <input id="bearer-token" type="text" placeholder="Paste your JWT token here" />
      <button onclick="setToken()">Apply Token</button>
      <button onclick="clearToken()" style="background-color: #f44336;">Clear</button>
    </div>
    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>
    <script>
      function setToken() {
        const token = document.getElementById('bearer-token').value.trim();
        if (token) {
          localStorage.setItem('bearerToken', token);
          ui.preauthorizeApiKey('bearerAuth', token);
          alert('Token applied! You can now access protected endpoints.');
        } else {
          alert('Please enter a token');
        }
      }

      function clearToken() {
        localStorage.removeItem('bearerToken');
        document.getElementById('bearer-token').value = '';
        ui.authActions.logoutWithPersistOption({});
        alert('Token cleared');
      }

      // Check for token in localStorage
      window.onload = function() {
        const savedToken = localStorage.getItem('bearerToken');
        if (savedToken) {
          document.getElementById('bearer-token').value = savedToken;
        }
      };

      window.ui = SwaggerUIBundle({
        url: "/openapi.json",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "BaseLayout",
        onComplete: function() {
          // Auto-apply token if available
          const savedToken = localStorage.getItem('bearerToken');
          if (savedToken) {
            ui.preauthorizeApiKey('bearerAuth', savedToken);
          }
        }
      });
    </script>
  </body>
</html>
